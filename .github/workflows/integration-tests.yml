name: Integration Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    env:
      MIX_ENV: test
      ENABLE_TESTCONTAINERS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Elixir & Erlang
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27.2"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-27.2-1.18-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-27.2-1.18-

      - name: Install dependencies
        run: |
          mix local.rebar --force
          mix local.hex --force
          mix deps.get
          mix deps.compile

      - name: Check Docker availability
        run: |
          docker --version
          docker compose version

      - name: Run Integration Tests
        run: mix test.integration

      - name: Retry failed tests (1st retry)
        if: failure()
        run: mix test --only integration --failed

      - name: Retry failed tests (2nd retry)
        if: failure()
        run: mix test --only integration --failed
